name: Upwork Job Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

        
      - name: Upwork監視スクリプトを実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          UPWORK_SEARCH_URLS: ${{ secrets.UPWORK_SEARCH_URLS }}
        run: python main.py

      - name: 送信済みIDファイルをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update sent_jobs [skip ci]"
          git push
